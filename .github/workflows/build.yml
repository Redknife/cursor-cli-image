name: Build and Publish Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve cursor-cli version
        id: cursor
        shell: bash
        run: |
          set -euo pipefail
          version="$(curl -fsSL https://cursor.com/install | sed -n 's|.*downloads.cursor.com/lab/\([^/]*\)/.*|\1|p' | head -n 1)"
          if [ -z "${version}" ]; then
            echo "Failed to resolve cursor-cli version" >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "Cursor CLI version: ${version}"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve build timestamp
        id: stamp
        shell: bash
        run: echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "${GITHUB_OUTPUT}"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/cursor-cli
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=tag
            type=raw,value=${{ steps.cursor.outputs.version }}
            type=raw,value={{date 'YYYYMMDD'}},enable=${{ github.event_name == 'schedule' }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            CURSOR_CLI_VERSION=${{ steps.cursor.outputs.version }}
            IMAGE_VERSION=${{ steps.cursor.outputs.version }}
            VCS_REF=${{ github.sha }}
            VCS_URL=${{ github.server_url }}/${{ github.repository }}
            IMAGE_CREATED=${{ steps.stamp.outputs.created }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Build summary
        shell: bash
        run: |
          {
            echo "## Published image"
            echo ""
            echo "- Image: \`ghcr.io/${{ github.repository_owner }}/cursor-cli\`"
            echo "- Cursor CLI version: \`${{ steps.cursor.outputs.version }}\`"
            echo "- Digest: \`${{ steps.build.outputs.digest }}\`"
            echo "- Tags:"
            echo "${{ steps.meta.outputs.tags }}" | sed 's/^/  - /'
          } >> "${GITHUB_STEP_SUMMARY}"
